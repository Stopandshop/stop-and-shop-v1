<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشف الأسعار الذكي | Stop & Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #f8fafc;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text-dark: #0f172a;
            --card-shadow: 0 15px 30px rgba(15, 23, 42, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--secondary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden; /* يمنع السكرول ويجبر العناصر على البقاء داخل الشاشة */
        }

        /* الحاوية الرئيسية المدمجة لضمان ظهور السعر */
        .checker-container {
            width: 100%;
            max-width: 580px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            padding: 15px 20px;
            text-align: center;
            border-top: 8px solid var(--primary);
            position: relative;
        }

        /* شريط علوي مدمج يحتوي على زر البحث اليدوي */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 5px;
        }

        .manual-search-btn {
            background: #f1f5f9;
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            color: var(--primary);
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* صندوق البحث اليدوي المنسدل */
        .search-box-container {
            display: none;
            margin-bottom: 10px;
        }

        .search-input-wrapper {
            display: flex;
            gap: 8px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
        }

        .search-input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            outline: none;
            text-align: center;
        }

        .search-input-wrapper button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* قسم اللوغو المصغر والمصلح لحل مشكلة المساحة */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .brand-logo-container {
            width: 70px;  /* تم تصغيره من 110px ليوفر مساحة للسعر */
            height: 70px; /* تم تصغيره من 110px ليوفر مساحة للسعر */
            border-radius: 50%;
            border: 3px solid #f1f5f9;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
            margin-bottom: 5px;
            overflow: hidden;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* تصغير حجم خط عنوان المتجر لرفع كروت السعر */
        .logo-section h1 {
            color: var(--primary);
            font-size: 1.4rem; /* تم تصغيره ليتناسب مع الشاشة */
            font-weight: 900;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .logo-section p {
            color: #64748b;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 2px;
        }

        /* حقل الاستقبال المخفي الخاص بالاسكانر */
        #barcode-input {
            position: fixed;
            top: -100px;
            left: -100px;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        /* واجهة الانتظار الافتراضية للزبون */
        .scan-instruction {
            margin: 20px 0;
        }

        .scan-instruction .icon-wrap {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px auto;
        }

        .scan-instruction i {
            font-size: 2.5rem;
            color: var(--primary-light);
        }

        .scan-instruction p {
            font-size: 1.2rem;
            color: #334155;
            font-weight: 700;
        }

        /* واجهة عرض النتيجة المدمجة للأسعار */
        .result-box {
            display: none;
            margin-top: 10px;
            animation: slideUp 0.3s ease-out;
        }

        /* عرض صورة المنتج بحجم مدمج */
        .product-image-container {
            width: 110px; /* تم تصغيره لرفع الأسعار للأعلى */
            height: 110px;
            margin: 0 auto 8px auto;
            border-radius: 14px;
            background: #ffffff;
            border: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image-container img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* تصغير حجم اسم المنتج لمنع النزول لأسفل */
        .product-name {
            font-size: 1.2rem; /* تم تصغيره ليظهر كاملاً في سطر واحد أو اثنين */
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
            line-height: 1.3;
            padding: 0 5px;
        }

        /* حاويات عرض الأسعار المزدوجة والمرفوعة */
        .price-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .price-card {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px 10px;
            border: 1px solid #f1f5f9;
            box-shadow: inset 0 -4px 0 var(--success);
        }

        .price-card.lbp {
            box-shadow: inset 0 -4px 0 var(--danger);
        }

        .price-label {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 700;
            margin-bottom: 4px;
        }

        /* حجم خط الأسعار ليكون واضحاً جداً للزبائن */
        .price-value {
            font-size: 1.5rem; /* حجم مناسب جداً وواضح ومحمي من الاختفاء */
            font-weight: 900;
            color: var(--success);
        }

        .price-card.lbp .price-value {
            color: var(--danger);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="checker-container">
        
        <div class="top-bar">
            <div></div> 
            <button class="manual-search-btn" onclick="toggleManualSearch()">
                <i class="fas fa-keyboard"></i> إدخال يدوي
            </button>
        </div>

        <div id="search-box-container" class="search-box-container">
            <div class="search-input-wrapper">
                <input type="text" id="manual-barcode-input" placeholder="اكتب رقم الباركود هنا...">
                <button onclick="submitManualSearch()">بحث</button>
            </div>
        </div>

        <div class="logo-section">
            <div class="brand-logo-container">
                <img src="logo.jpg" alt="Stop & Shop Logo" class="brand-logo" onerror="this.src='https://via.placeholder.com/70?text=S%26S'">
            </div>
            <h1>STOP & SHOP</h1>
            <p>نظام كاشف الأسعار الذكي</p>
        </div>

        <input type="text" id="barcode-input" autofocus onkeypress="handleBarcode(event)">

        <div id="instruction-view" class="scan-instruction">
            <div class="icon-wrap">
                <i class="fas fa-barcode"></i>
            </div>
            <p>يرجى تمرير باركود المنتج هنا</p>
        </div>

        <div id="result-view" class="result-box">
            
            <div class="product-image-container">
                <img id="prod-img" src="" alt="Product Image" onerror="this.src='https://via.placeholder.com/110?text=No+Image'">
            </div>

            <div id="prod-name" class="product-name">جاري قراءة بيانات الصنف...</div>
            
            <div class="price-row">
                <div class="price-card">
                    <div class="price-label">السعر بالدولار</div>
                    <div id="prod-price-usd" class="price-value">0.00 $</div>
                </div>

                <div class="price-card lbp">
                    <div class="price-label">السعر بالليرة اللبنانية</div>
                    <div id="prod-price-lbp" class="price-value">0 L.L</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ يرجى إعادة وضع الـ firebaseConfig الخاصة بمشروعك هنا ليعود الاتصال فوراً:
       const firebaseConfig = {
        apiKey: "AIzaSyCLBuU3lpqpNKiQvH5hDoQAYtdzePUsxp8",
        authDomain: "stopandshop-157ff.firebaseapp.com",
        projectId: "stopandshop-157ff",
        storageBucket: "stopandshop-157ff.firebasestorage.app",
        messagingSenderId: "622958508953",
        appId: "1:622958508953:web:8f2b8f60f1d4e323353108"
    };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const exchangeRate = 90000; // سعر صرف دولار الماركت في لبنان
        const defaultImg = "https://via.placeholder.com/110?text=Stop+%26+Shop"; 
        let resetTimer;

        window.onload = function() {
            keepFocusOnScanner();
        };
        document.addEventListener('click', (e) => {
            if(e.target.id !== 'manual-barcode-input') {
                keepFocusOnScanner();
            }
        });

        function keepFocusOnScanner() {
            document.getElementById('barcode-input').focus();
        }

        function toggleManualSearch() {
            const container = document.getElementById('search-box-container');
            if(container.style.display === 'block') {
                container.style.display = 'none';
                keepFocusOnScanner();
            } else {
                container.style.display = 'block';
                document.getElementById('manual-barcode-input').focus();
            }
        }

        function submitManualSearch() {
            const inputVal = document.getElementById('manual-barcode-input').value.trim();
            if(inputVal) {
                fetchProductFromFirebase(inputVal);
                document.getElementById('manual-barcode-input').value = '';
                document.getElementById('search-box-container').style.display = 'none';
            }
        }

        function handleBarcode(event) {
            if (event.key === 'Enter') {
                const barcode = event.target.value.trim();
                if (barcode) {
                    fetchProductFromFirebase(barcode);
                }
                event.target.value = ''; 
            }
        }

        function fetchProductFromFirebase(barcode) {
            document.getElementById('instruction-view').style.display = 'none';
            const resultView = document.getElementById('result-view');
            resultView.style.display = 'block';
            
            document.getElementById('prod-name').innerText = "جاري قراءة بيانات الصنف...";
            document.getElementById('prod-img').src = defaultImg;

            db.collection("products").doc(barcode).get().then((doc) => {
                if (doc.exists) {
                    displayProduct(doc.data());
                } else {
                    searchByBarcodeField(barcode);
                }
            }).catch((error) => {
                document.getElementById('prod-name').innerText = "⚠️ حدث خطأ في الاتصال";
            });

            clearTimeout(resetTimer);
            resetTimer = setTimeout(() => {
                resultView.style.display = 'none';
                document.getElementById('instruction-view').style.display = 'block';
                keepFocusOnScanner();
            }, 6000); 
        }

        function searchByBarcodeField(barcode) {
            db.collection("products").where("barcode", "==", barcode).get().then((querySnapshot) => {
                if (!querySnapshot.empty) {
                    querySnapshot.forEach((doc) => {
                        displayProduct(doc.data());
                    });
                } else {
                    document.getElementById('prod-name').innerText = "❌ المنتج غير مسجل حالياً";
                    document.getElementById('prod-price-usd').innerText = "$0.00";
                    document.getElementById('prod-price-lbp').innerText = "0 ل.ل";
                    document.getElementById('prod-img').src = defaultImg;
                }
            });
        }

        function displayProduct(data) {
            document.getElementById('prod-name').innerText = data.name || "صنف بدون اسم";
            document.getElementById('prod-img').src = data.image || defaultImg;
            
            const priceUSD = parseFloat(data.price) || 0;
            document.getElementById('prod-price-usd').innerText = `$${priceUSD.toFixed(2)}`;
            
            const priceLBP = Math.round(priceUSD * exchangeRate);
            document.getElementById('prod-price-lbp').innerText = `${priceLBP.toLocaleString('en-US')} ل.ل`;
        }
    </script>
</body>
</html>
